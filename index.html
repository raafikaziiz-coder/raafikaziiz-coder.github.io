<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Raafik Aziiz Nur Jaliil — Galaxy Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui;
      background: #030712;
      color: #e5e7eb;
    }

    /* ================= NAVBAR ================= */

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: #020617;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
    }

    /* ✅ GALAXY LOGO */
    .brand-logo-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;

      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.25), transparent 30%),
        radial-gradient(circle at 70% 80%, rgba(56,189,248,0.18), transparent 40%),
        radial-gradient(circle at 40% 70%, rgba(34,197,94,0.12), transparent 45%),
        rgba(15, 23, 42, 0.95);

      border: 1px solid rgba(56,189,248,0.4);

      box-shadow:
        0 0 35px rgba(56,189,248,0.25),
        inset 0 0 25px rgba(56,189,248,0.08);
    }

    .brand-logo-wrap::before {
      content: "";
      position: absolute;
      width: 90px;
      height: 28px;
      border: 1px solid rgba(56,189,248,0.5);
      border-radius: 999px;
      transform: rotate(-25deg);
    }

    .brand-logo-wrap::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      right: 10px;
      top: 12px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 14px rgba(34,197,94,0.9);
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      z-index: 2;
      filter: drop-shadow(0 0 14px rgba(56,189,248,0.5));
    }

    /* ✅ TEXT BRAND */

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-title {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .brand-dot {
      color: #38bdf8;
      text-shadow: 0 0 16px #38bdf8;
    }

    .brand-text span {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    /* ================= MENU ================= */

    .menu {
      display: flex;
      gap: 20px;
      font-weight: 600;
    }

    .menu a {
      color: #94a3b8;
      text-decoration: none;
    }

    .menu a:hover {
      color: #38bdf8;
    }

    /* ================= HERO ================= */

    .hero {
      padding: 60px 28px;
    }

    h1 {
      font-size: 72px;
      line-height: 1;
    }

    .gradient {
      background: linear-gradient(90deg,#38bdf8,#22c55e);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero p {
      color: #9ca3af;
      max-width: 600px;
      margin-top: 20px;
    }

    /* ================= MOBILE ================= */

    @media (max-width:768px) {

      .brand-logo-wrap {
        width: 60px;
        height: 60px;
      }

      .brand-logo {
        width: 46px;
        height: 46px;
      }

      .brand-title {
        font-size: 1.4rem;
      }

      h1 {
        font-size: 44px;
      }

      .menu {
        display: none;
      }
    }

  </style>
</head>

<body>

  <div class="navbar">

    <!-- ✅ BRAND FIX -->
    <a href="#" class="brand">

      <div class="brand-logo-wrap">
        <img src="ra-logo.png" class="brand-logo">
      </div>

      <div class="brand-text">
        <div class="brand-title">
          Raff<span class="brand-dot">.</span>
        </div>
        <span>Software • Pine • Linux</span>
      </div>

    </a>

    <!-- MENU -->
    <div class="menu">
      <a href="#">Home</a>
      <a href="#">Stack</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
      <a href="resume.html">Resume ↗</a>
    </div>

  </div>

  <!-- HERO -->
  <section class="hero">

    <h1>
      Coding Beyond <br>
      <span class="gradient">Galaxy</span>
    </h1>

    <p>
      Halo, saya <strong>Raafik Aziiz Nur Jaliil</strong>.
      Aspiring Software Engineer, Pine Script Developer, dan Linux Enthusiast
      yang membangun project clean dan punya karakter visual kuat.
    </p>

  </section>

</body>
</html>
